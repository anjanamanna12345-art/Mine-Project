services:
  # 1. Main Gateway Service
  - type: web
    name: mine-gateway
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python mine_main/manage.py migrate && python create_superusers.py mine_main"
    startCommand: "cd mine_main && gunicorn mine_main.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: KITCHEN_URL
        fromService:
          type: web
          name: mine-kitchen
          envVarKey: RENDER_EXTERNAL_URL
      - key: SHOP_URL
        fromService:
          type: web
          name: mine-shop
          envVarKey: RENDER_EXTERNAL_URL
      - key: MUSIC_URL
        fromService:
          type: web
          name: mine-music
          envVarKey: RENDER_EXTERNAL_URL
      - key: GATEWAY_URL
        fromService:
          type: web
          name: mine-gateway
          envVarKey: RENDER_EXTERNAL_URL

